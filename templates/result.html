<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Career Guidance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(to right, #74ebd5, #8a9be9ff);
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            background: #F7F7F7;
            margin: 40px auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
        }
        h2 {
            text-align: center;
            color: #4B3E2F;
        }
        p {
            white-space: pre-line;
            color: #333;
            line-height: 1.6;
            margin-top: 20px;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #3B82F6;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 30px;
            cursor: pointer;
        }
        button:hover {
            background-color: #2563EB;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            color: #F0EDEB;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📋 Hello {{ name }}, Here's Your Career Guidance</h2>
        <div>
            <p>{{ result|safe }}</p>
        </div>
        <a href="/"><button>🔁 Start Again</button></a>
    </div>
    <footer>Guided by AI. Inspired by You.</footer>
</body>
</html>
